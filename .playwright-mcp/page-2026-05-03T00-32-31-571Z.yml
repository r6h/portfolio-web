        - heading "From booking to return, with fleet support in the middle." [level=2] [ref=e75]
        - paragraph [ref=e76]: The Fleetly flow starts with the rider and ends with a healthy fleet. Booking, route awareness, charge visibility, maintenance and support are part of the same service loop.
      - generic [ref=e77]:
        - article [ref=e78]:
          - generic [ref=e79]: 01 Discover and reserve
          - strong [ref=e80]: Users locate a nearby vehicle and book it from the web app.
          - paragraph [ref=e81]: The platform supports vehicle discovery, route context and flexible pricing models such as pay-per-use and subscriptions.
        - article [ref=e82]:
          - generic [ref=e83]: 02 Ride, monitor and support
          - strong [ref=e84]: Vehicles stay visible while the service team watches charge, availability and incidents.
          - paragraph [ref=e85]: Operators can react to low battery, maintenance needs or active support issues before they turn into service gaps.
        - article [ref=e86]:
          - generic [ref=e87]: 03 Return and keep the fleet ready
          - strong [ref=e88]: Trips end at strategic Fleetly points and the system feeds the next operational decision.
          - paragraph [ref=e89]: Returned vehicles move back into availability, maintenance queues or charging workflows depending on their status and usage data.
        - generic [ref=e90]:
          - generic [ref=e91]: Service promise
          - generic [ref=e92]: Electric. Shared. Accessible.
          - paragraph [ref=e93]: Fleetly is positioned as a practical sustainable mobility service with real operational support behind the user experience.
